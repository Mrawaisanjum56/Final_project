{% extends 'base.html' %}
{% block title %}Update Product | project{% endblock %}

{% block content %}
<!-- breadcrumb-section -->
<div class="breadcrumb-section breadcrumb-bg">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 offset-lg-2 text-center">
                <div class="breadcrumb-text">
                    <p>Modify your listing</p>
                    <h1>Update Product</h1>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg p-5" style="border-radius: 20px; background: rgba(255,255,255,0.9);">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% include 'includes/product_form_fields.html' with form=form product=product %}
                    <div class="mt-4">
                        <button type="submit" class="btn boxed-btn rounded-pill px-5">Save Changes</button>
                        <a href="{% url 'farmer_dashboard' %}" class="btn btn-outline-secondary rounded-pill px-5 ml-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
