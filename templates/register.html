{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Register | project</title>

	<!-- google font -->
	<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">
	<!-- bootstrap -->
	<link rel="stylesheet" href="{% static 'assets/bootstrap/css/bootstrap.min.css' %}">
	<!-- main style -->
	<link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
	<!-- responsive -->
	<link rel="stylesheet" href="{% static 'assets/css/responsive.css' %}">

	<style>
		body {
			background: url("{% static 'assets/img/hero-bg.jpg' %}") no-repeat center center fixed;
			background-size: cover;
			height: auto;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px 12px;
			overflow-y: auto;
		}
		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background: rgba(5, 25, 34, 0.5);
			z-index: 0;
		}
		.register-card {
			position: relative;
			z-index: 1;
			background: rgba(255, 255, 255, 0.96);
			padding: 30px 28px 24px;
			border-radius: 18px;
			box-shadow: 0 20px 45px rgba(0,0,0,0.28);
			width: 100%;
			max-width: 500px;
			margin: auto;
		}
		.register-card h2 {
			font-weight: 700;
			margin-bottom: 6px;
			color: #051922;
		}
		.register-subtitle {
			font-size: 0.92rem;
			color: #5c6f79;
			margin-bottom: 18px;
		}
		.register-card label {
			font-weight: 600;
			color: #051922;
			margin-bottom: 5px;
			font-size: 0.9em;
			display: block;
		}
		.register-card input, .register-card select, .register-card textarea {
			border: 1px solid #ddd;
			border-radius: 10px;
			padding: 10px 12px;
			margin-bottom: 4px;
			width: 100%;
		}
		.register-card textarea {
			height: 72px; 
			resize: none;
		}
		.boxed-btn {
			width: 100%;
			border: none;
			cursor: pointer;
			font-size: 16px;
			padding: 12px;
			margin-top: 10px;
		}
		.helptext {
			font-size: 0.72em;
			color: #666;
			display: block;
			margin-bottom: 8px;
			line-height: 1.4;
		}
		.register-card p {
			margin-bottom: 10px;
		}
		.register-card ul.errorlist {
			list-style: none;
			padding-left: 0;
			margin-bottom: 8px;
			color: #b81428;
			font-size: 0.82rem;
		}
		.register-card .field-block p {
			margin-bottom: 8px;
		}
		@media (max-width: 576px) {
			.register-card {
				padding: 24px 16px 20px;
				border-radius: 14px;
			}
		}
	</style>
</head>
<body>
	<div class="register-card text-center">
		<h2>Register</h2>
		<p class="register-subtitle">Create your account to start buying and selling.</p>
		<form method="post">
			{% csrf_token %}
			{% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
			<div class="text-left field-block">{{ form.as_p }}</div>
			<button type="submit" class="boxed-btn">Register</button>
		</form>
		<p class="mt-2 mb-1">Already have an account? <a href="{% url 'login' %}{% if next %}?next={{ next }}{% endif %}" style="color: #F28123; font-weight: bold;">Login here</a></p>
		<a href="{% url 'home' %}" style="color: #F28123; font-weight: 600; text-decoration: none; display: block; margin-top: 5px;">← Back to Home</a>
	</div>
</body>
</html>
