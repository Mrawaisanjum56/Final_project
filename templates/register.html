{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Register | project</title>

	<!-- google font -->
	<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">
	<!-- bootstrap -->
	<link rel="stylesheet" href="{% static 'assets/bootstrap/css/bootstrap.min.css' %}">
	<!-- main style -->
	<link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
	<!-- responsive -->
	<link rel="stylesheet" href="{% static 'assets/css/responsive.css' %}">

	<style>
		body {
			background: url("{% static 'assets/img/hero-bg.jpg' %}") no-repeat center center fixed;
			background-size: cover;
			height: auto;
			min-height: 100vh;
			display: flex;
			padding: 40px 0;
			overflow-y: auto;
		}
		.register-card {
			background: rgba(255, 255, 255, 0.98);
			padding: 15px 40px;
			border-radius: 15px;
			box-shadow: 0 15px 35px rgba(0,0,0,0.3);
			width: 100%;
			max-width: 550px;
			margin: auto;
		}
		.register-card h2 {
			font-weight: 700;
			margin-bottom: 10px;
			color: #051922;
		}
		.register-card label {
			font-weight: 600;
			color: #051922;
			margin-bottom: 5px;
			font-size: 0.9em;
			display: block;
		}
		.register-card input, .register-card select, .register-card textarea {
			border: 1px solid #ddd;
			border-radius: 5px;
			padding: 10px 12px;
			margin-bottom: 2px;
			width: 100%;
		}
		.register-card textarea {
			height: 80px; 
			resize: none;
		}
		.boxed-btn {
			width: 100%;
			border: none;
			cursor: pointer;
			font-size: 16px;
			padding: 12px;
			margin-top: 15px;
		}
		.helptext {
			font-size: 0.75em;
			color: #666;
			display: block;
			margin-bottom: 10px;
			line-height: 1.4;
		}
		.register-card p {
			margin-bottom: 15px;
		}
	</style>
</head>
<body>
	<div class="register-card text-center">
		<h2>Register</h2>
		<form method="post">
			{% csrf_token %}
			{% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
			<div class="text-left" style="margin-top: 20px;">{{ form.as_p }}</div>
			<button type="submit" class="boxed-btn">Register</button>
		</form>
		<p class="mt-2 mb-1">Already have an account? <a href="{% url 'login' %}{% if next %}?next={{ next }}{% endif %}" style="color: #F28123; font-weight: bold;">Login here</a></p>
		<a href="{% url 'home' %}" style="color: #F28123; font-weight: 600; text-decoration: none; display: block; margin-top: 5px;">← Back to Home</a>
	</div>
</body>
</html>
